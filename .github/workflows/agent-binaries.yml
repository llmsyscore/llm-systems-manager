name: Agent binaries

# PyInstaller single-file agent builds (#386): PR gate on agent changes, and on
# v* tags the binaries + checksums are uploaded to the GitHub Release.

on:
  pull_request:
    paths:
      - "agent/**"
      - "!agent/tests/**"
      - "tools/packaging/**"
      - ".github/workflows/agent-binaries.yml"
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.asset_suffix }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # ubuntu-22.04 runners keep the glibc baseline old (>= 2.35 hosts).
          # unit_tmpl: the platform's service manager template bundled in the tarball.
          - runner: ubuntu-22.04
            asset_suffix: linux-x86_64
            smoke_image: ubuntu:22.04
            unit_tmpl: llm-systems-agent-binary.service.tmpl
          - runner: ubuntu-22.04-arm
            asset_suffix: linux-arm64
            smoke_image: ubuntu:22.04
            unit_tmpl: llm-systems-agent-binary.service.tmpl
          - runner: macos-latest
            asset_suffix: macos-arm64
            smoke_image: ""
            unit_tmpl: com.llm-systems-agent-binary.plist.tmpl
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: agent/install/requirements*.txt

      - name: Build binary
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller \
            -r agent/install/requirements.txt \
            -r agent/install/requirements-monitor.txt
          pyinstaller --clean --noconfirm agent/llm-systems-agent.spec

      # Prove self-containedness: boot on a host with NO python and hit /health.
      - name: Smoke test (clean container, no Python)
        if: matrix.smoke_image != ''
        run: |
          docker run -d --name agent-smoke -p 18082:8082 \
            -v "$PWD/dist:/w" -w /w "${{ matrix.smoke_image }}" ./llm-systems-agent
          for i in $(seq 1 30); do
            curl -fsS http://localhost:18082/health && ok=1 && break
            sleep 2
          done
          [ "${ok:-}" = "1" ] || { docker logs agent-smoke; exit 1; }
          curl -fsS http://localhost:18082/health | grep -q '"status":"ok"'
          curl -fsS http://localhost:18082/identify | grep -q '"capabilities"'
          docker rm -f agent-smoke

      - name: Smoke test (macOS, run directly)
        if: matrix.smoke_image == ''
        run: |
          ./dist/llm-systems-agent > agent-smoke.log 2>&1 &
          AGENT_PID=$!
          for i in $(seq 1 30); do
            curl -fsS http://localhost:8082/health && ok=1 && break
            sleep 2
          done
          [ "${ok:-}" = "1" ] || { cat agent-smoke.log; exit 1; }
          curl -fsS http://localhost:8082/health | grep -q '"status":"ok"'
          kill "$AGENT_PID"

      # Bundle the binary + the documented example config + the platform's
      # service-manager unit into one per-platform tarball, checksummed for
      # offline verify.
      - name: Package + checksum
        env:
          UNIT: ${{ matrix.unit_tmpl }}
        run: |
          ASSET="llm-systems-agent-${{ matrix.asset_suffix }}"
          mkdir -p stage
          mv dist/llm-systems-agent stage/llm-systems-agent
          cp agent/agent_config.yaml.example stage/agent_config.yaml.example
          cp "agent/install/$UNIT" "stage/$UNIT"
          tar -C stage -czf "$ASSET.tar.gz" \
            llm-systems-agent agent_config.yaml.example "$UNIT"
          shasum -a 256 "$ASSET.tar.gz" > "$ASSET.tar.gz.sha256" 2>/dev/null \
            || sha256sum "$ASSET.tar.gz" > "$ASSET.tar.gz.sha256"

      # Assert the layout frozen self-update expects: the binary member is
      # named exactly 'llm-systems-agent' at the tarball root (matches
      # frozen_self_update.BINARY_MEMBER), alongside the config + unit template.
      - name: Sanity-check tarball layout
        env:
          UNIT: ${{ matrix.unit_tmpl }}
        run: |
          ASSET="llm-systems-agent-${{ matrix.asset_suffix }}"
          tar -tzf "$ASSET.tar.gz" | grep -qx "llm-systems-agent"
          tar -tzf "$ASSET.tar.gz" | grep -qx "agent_config.yaml.example"
          tar -tzf "$ASSET.tar.gz" | grep -qx "$UNIT"

      # Native packages (#385): wrap this leg's binary as .deb + .rpm.
      - name: Build native packages (.deb/.rpm)
        if: matrix.smoke_image != ''
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ruby rpm binutils
          sudo gem install fpm --no-document
          case "${{ matrix.asset_suffix }}" in
            linux-x86_64) PKG_ARCH=amd64 ;;
            linux-arm64)  PKG_ARCH=arm64 ;;
          esac
          VERSION="${GITHUB_REF_NAME#v}"
          case "$GITHUB_REF" in refs/tags/*) ;; *) VERSION="0.0.1" ;; esac
          tools/packaging/build-agent-package.sh \
            --binary stage/llm-systems-agent --version "$VERSION" \
            --arch "$PKG_ARCH" --out dist-pkg

      # Mixed-state guards (#416): must refuse over a script (venv) install.
      - name: Guard refuses over a venv install (.deb)
        if: matrix.smoke_image != ''
        run: |
          sudo mkdir -p /opt/llm-systems-agent/venv
          sudo touch /opt/llm-systems-agent/llm-systems-agent.py
          set +e
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            ./dist-pkg/llm-systems-agent_*.deb >/tmp/g-agent.log 2>&1; RC=$?
          set -e
          cat /tmp/g-agent.log
          if [ "$RC" = "0" ]; then echo 'ERROR: install should have been refused'; exit 1; fi
          if ! grep -q 'refusing to install over an existing script (venv) install' /tmp/g-agent.log; then
            echo 'ERROR: apt failed, but not because of the #416 guard'; exit 1
          fi
          if dpkg-query -W -f='${db:Status-Status}' llm-systems-agent 2>/dev/null | grep -qx installed; then
            echo 'ERROR: package installed despite refusal'; exit 1
          fi
          sudo rm -rf /opt/llm-systems-agent

      # apt install → identity/unit/ownership/config/health asserts → purge.
      - name: Install test (.deb)
        if: matrix.smoke_image != ''
        run: |
          echo "llm-systems-agent llm-systems-agent/manager-url string http://127.0.0.1:5000" \
            | sudo debconf-set-selections
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y ./dist-pkg/llm-systems-agent_*.deb
          set -x
          getent passwd llmsys
          test -f /usr/lib/systemd/system/llm-systems-agent.service
          systemctl is-enabled llm-systems-agent
          sudo stat -c '%U' /opt/llm-systems-agent/llm-systems-agent | grep -qx llmsys
          sudo grep -q 'MANAGER_URL: *"http://127.0.0.1:5000"' /opt/llm-systems-agent/agent_config.yaml
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:8082/health >/dev/null 2>&1 && break
            sleep 2
          done
          curl -fsS http://127.0.0.1:8082/health | grep -q '"status":"ok"'
          # Script installer must refuse this package-managed host (#416).
          set +e
          sudo bash agent/install/install.sh --update -y </dev/null >/tmp/agent-upd.log 2>&1; RC=$?
          set -e
          test "$RC" = "2"
          grep -q 'managed by the native' /tmp/agent-upd.log
          systemctl is-active llm-systems-agent
          sudo apt-get purge -y llm-systems-agent
          test ! -e /opt/llm-systems-agent
          test ! -e /usr/lib/systemd/system/llm-systems-agent.service
          if getent passwd llmsys; then echo 'ERROR: llmsys survived purge'; exit 1; fi

      # Tarball adoption (#416): binary+config with no unit is a supported
      # migration — config preserved, adopted=1, purge keeps config.
      - name: Tarball-adoption test (.deb)
        if: matrix.smoke_image != ''
        run: |
          sudo mkdir -p /opt/llm-systems-agent
          sudo cp stage/llm-systems-agent /opt/llm-systems-agent/llm-systems-agent
          printf 'MANAGER_URL: "http://192.0.2.99:5000"\n' | sudo tee /opt/llm-systems-agent/agent_config.yaml >/dev/null
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y ./dist-pkg/llm-systems-agent_*.deb
          sudo grep -q '^adopted=1' /opt/llm-systems-agent/.llmsys-package-state
          sudo grep -q '192.0.2.99' /opt/llm-systems-agent/agent_config.yaml
          sudo apt-get purge -y llm-systems-agent
          sudo test -f /opt/llm-systems-agent/agent_config.yaml
          sudo rm -rf /opt/llm-systems-agent
          sudo userdel -r llmsys 2>/dev/null || true

      - name: Agent service log on failure
        if: failure() && matrix.smoke_image != ''
        run: |
          sudo journalctl -u llm-systems-agent --no-pager -n 200 || true
          sudo cat /tmp/agent-upd.log 2>/dev/null || true

      # PR-gate inspection copy only; tag builds ship via the release assets.
      - uses: actions/upload-artifact@v4
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        with:
          name: llm-systems-agent-${{ matrix.asset_suffix }}
          path: |
            llm-systems-agent-${{ matrix.asset_suffix }}.tar.gz
            llm-systems-agent-${{ matrix.asset_suffix }}.tar.gz.sha256
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        if: ${{ !startsWith(github.ref, 'refs/tags/') && matrix.smoke_image != '' }}
        with:
          name: llm-systems-agent-packages-${{ matrix.asset_suffix }}
          path: dist-pkg/
          if-no-files-found: error

      # The Release workflow creates the release on the same tag push; wait for
      # it (GITHUB_TOKEN-created releases emit no release event to chain from).
      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for i in $(seq 1 40); do
            gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 && ok=1 && break
            sleep 15
          done
          [ "${ok:-}" = "1" ] || { echo "release $GITHUB_REF_NAME never appeared" >&2; exit 1; }
          gh release upload "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --clobber \
            "llm-systems-agent-${{ matrix.asset_suffix }}.tar.gz" \
            "llm-systems-agent-${{ matrix.asset_suffix }}.tar.gz.sha256"

      # The release was already awaited by the tarball upload above.
      - name: Upload packages to release
        if: startsWith(github.ref, 'refs/tags/') && matrix.smoke_image != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --clobber dist-pkg/*
