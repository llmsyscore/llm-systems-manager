name: Package tests

# Native-package integration tests (#385): build the .deb/.rpm with fpm,
# then prove the acceptance criteria on both families.
# - deb-install: apt install ./*.deb on the systemd runner → user/units/
#   venvs/config asserts + /health checks, an upgrade pass (config
#   preserved, services restarted), then purge → zero leftovers.
# - rpm-install: dnf install ./*.rpm in a rockylinux:9 container (EL9 base
#   python3 is 3.9 — python3.11 exercises the interpreter picker). No
#   systemd in-container, so the manager is health-checked via a direct
#   venv launch; erase asserts the generated venvs are gone.

on:
  pull_request:
    branches: [main]
    paths:
      - "tools/packaging/**"
      - "tools/installer/**"
      - "systemd/**"
      - "llm-systems-alarm-engine/systemd/**"
      - "**/requirements*.txt"
      - ".github/workflows/package-test.yml"
  workflow_dispatch:

concurrency:
  group: package-test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: build .deb + .rpm (fpm)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install fpm + rpmbuild
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ruby rpm binutils
          sudo gem install fpm --no-document

      # Second version (deb only — rpm-install only uses 0.0.1) so
      # deb-install can exercise the upgrade path.
      - name: Build packages
        run: |
          tools/packaging/build-packages.sh --version 0.0.1 --out dist
          tools/packaging/build-packages.sh --version 0.0.2 --formats deb --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: packages
          path: dist/
          retention-days: 3

  deb-install:
    name: deb install/upgrade/purge (apt)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: packages
          path: dist

      - name: Install .deb (fresh)
        run: sudo DEBIAN_FRONTEND=noninteractive apt-get install -y ./dist/llm-systems-manager_0.0.1_all.deb

      - name: Assert install state
        run: |
          set -x
          getent passwd llmsys
          test -f /usr/lib/systemd/system/llm-systems-manager.service
          test -f /usr/lib/systemd/system/llm-systems-alarm-engine.service
          # /etc/sudoers.d is root-only on the runner image — stat as root.
          sudo test -f /etc/sudoers.d/llm-systems-manager
          sudo visudo -cf /etc/sudoers.d/llm-systems-manager
          systemctl is-enabled llm-systems-manager llm-systems-alarm-engine
          sudo test -x /opt/llm-systems-manager/llm-systems-manager/venv/bin/python3
          sudo test -x /opt/llm-systems-manager/llm-systems-alarm-engine/venv/bin/python3
          sudo stat -c '%U %a' /opt/llm-systems-manager/config/llm-systems.toml | grep -qx 'llmsys 600'

      # The alarm engine serves HTTPS (self-signed cert pre-issued by the
      # config bootstrap), so its probe is https + -k.
      - name: Health checks
        run: |
          set -o pipefail
          probe() { for i in $(seq 1 30); do curl -fsSk "$1" >/dev/null 2>&1 && return 0; sleep 2; done; return 1; }
          probe http://127.0.0.1:5000/health
          probe https://127.0.0.1:8081/health
          curl -fsS  http://127.0.0.1:5000/health | jq .
          curl -fsSk https://127.0.0.1:8081/health | jq .

      # Upgrade must keep the live config (marker key survives) and leave
      # both services running.
      - name: Upgrade to 0.0.2
        run: |
          STARTED_BEFORE="$(systemctl show -p ActiveEnterTimestamp --value llm-systems-manager)"
          echo '# ci-upgrade-marker' | sudo tee -a /opt/llm-systems-manager/config/llm-systems.toml >/dev/null
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y ./dist/llm-systems-manager_0.0.2_all.deb
          dpkg-query -W -f='${Version}' llm-systems-manager | grep -qx 0.0.2
          sudo grep -q 'ci-upgrade-marker' /opt/llm-systems-manager/config/llm-systems.toml
          ls /opt/llm-systems-manager/config/llm-systems.toml.bak.* 2>/dev/null && exit 1 || true
          probe() { for i in $(seq 1 30); do curl -fsSk "$1" >/dev/null 2>&1 && return 0; sleep 2; done; return 1; }
          probe http://127.0.0.1:5000/health
          probe https://127.0.0.1:8081/health
          # try-restart must have bounced the service (fresh start timestamp).
          test "$(systemctl show -p ActiveEnterTimestamp --value llm-systems-manager)" != "$STARTED_BEFORE"

      - name: Purge → no leftovers
        run: |
          sudo apt-get purge -y llm-systems-manager
          set -x
          ! getent passwd llmsys
          test ! -e /opt/llm-systems-manager
          test ! -e /var/log/llm-systems-manager
          test ! -e /usr/lib/systemd/system/llm-systems-manager.service
          test ! -e /usr/lib/systemd/system/llm-systems-alarm-engine.service
          sudo test ! -e /etc/sudoers.d/llm-systems-manager
          ! systemctl status llm-systems-manager >/dev/null 2>&1

      - name: Collect service logs on failure
        if: failure()
        run: |
          sudo journalctl -u llm-systems-manager --no-pager -n 200 || true
          sudo journalctl -u llm-systems-alarm-engine --no-pager -n 200 || true

  # Mixed-state guards (#416): packages must refuse to damage a script
  # install and vice versa; forced adoption must purge conservatively.
  deb-guards:
    name: deb mixed-state guards (#416)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: packages
          path: dist

      - name: Refuse fresh install over script-install state
        run: |
          sudo mkdir -p /opt/llm-systems-manager/config
          echo '# sim-script-install' | sudo tee /opt/llm-systems-manager/config/llm-systems.toml >/dev/null
          printf '[Unit]\nDescription=sim\n[Service]\nExecStart=/bin/true\n' \
            | sudo tee /etc/systemd/system/llm-systems-manager.service >/dev/null
          if sudo DEBIAN_FRONTEND=noninteractive apt-get install -y ./dist/llm-systems-manager_0.0.1_all.deb; then
            echo 'ERROR: install should have been refused'; exit 1
          fi
          dpkg-query -W -f='${Status}' llm-systems-manager 2>/dev/null | grep -q 'install ok installed' && exit 1
          sudo grep -q 'sim-script-install' /opt/llm-systems-manager/config/llm-systems.toml
          sudo rm -f /etc/systemd/system/llm-systems-manager.service

      - name: Refuse fresh install when the ports are taken
        run: |
          sudo rm -rf /opt/llm-systems-manager
          python3 -m http.server 5000 >/dev/null 2>&1 &
          SRV=$!; sleep 2
          if sudo DEBIAN_FRONTEND=noninteractive apt-get install -y ./dist/llm-systems-manager_0.0.1_all.deb; then
            echo 'ERROR: install should have been refused (port busy)'; exit 1
          fi
          kill "$SRV"

      - name: Forced adoption marks the tree and purge keeps foreign config
        run: |
          sudo mkdir -p /opt/llm-systems-manager/config
          echo '# sim-foreign-config' | sudo tee /opt/llm-systems-manager/config/llm-systems.toml >/dev/null
          sudo LLMSYS_PACKAGE_FORCE=1 DEBIAN_FRONTEND=noninteractive \
            apt-get install -y ./dist/llm-systems-manager_0.0.1_all.deb
          sudo grep -q '^adopted=1' /opt/llm-systems-manager/.llmsys-package-state
          sudo grep -q 'sim-foreign-config' /opt/llm-systems-manager/config/llm-systems.toml
          sudo apt-get purge -y llm-systems-manager
          sudo test -f /opt/llm-systems-manager/config/llm-systems.toml
          getent passwd llmsys
          sudo rm -rf /opt/llm-systems-manager /var/log/llm-systems-manager
          sudo userdel -r llmsys 2>/dev/null || true

      - name: Script tools refuse a package-managed host
        run: |
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y ./dist/llm-systems-manager_0.0.1_all.deb
          set +e
          sudo bash tools/installer/update.sh --yes </dev/null >/tmp/upd.log 2>&1; RC_UPD=$?
          sudo bash tools/installer/uninstall.sh </dev/null >/tmp/uni.log 2>&1; RC_UNI=$?
          sudo bash tools/installer/install.sh --mode 3 --source local --no-self-update </dev/null >/tmp/ins.log 2>&1; RC_INS=$?
          set -e
          test "$RC_UPD" = "2" && grep -q 'managed by the native' /tmp/upd.log
          test "$RC_UNI" = "2" && grep -q 'installed as native package' /tmp/uni.log
          test "$RC_INS" = "2" && grep -q 'managed by the native' /tmp/ins.log
          systemctl is-active llm-systems-manager

      - name: Clean purge is still a full purge (regression)
        run: |
          sudo apt-get purge -y llm-systems-manager
          test ! -e /opt/llm-systems-manager
          test ! -e /var/log/llm-systems-manager
          ! getent passwd llmsys

      - name: Show logs on failure
        if: failure()
        run: |
          for f in /tmp/upd.log /tmp/uni.log /tmp/ins.log; do
            echo "=== $f"; sudo cat "$f" 2>/dev/null || true
          done
          sudo journalctl -u llm-systems-manager --no-pager -n 100 || true

  rpm-install:
    name: rpm install/erase (dnf, rocky 9)
    runs-on: ubuntu-latest
    needs: build
    container: rockylinux:9
    timeout-minutes: 30
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: packages
          path: dist

      # %pre must refuse over simulated script-install state (#416).
      - name: Guard refuses over script-install state
        run: |
          dnf install -y python3.11 python3.11-pip util-linux shadow-utils
          mkdir -p /etc/systemd/system /opt/llm-systems-manager/config
          echo '# sim-script-install' > /opt/llm-systems-manager/config/llm-systems.toml
          printf '[Unit]\nDescription=sim\n' > /etc/systemd/system/llm-systems-manager.service
          if dnf install -y ./dist/llm-systems-manager-0.0.1-1.noarch.rpm; then
            echo 'ERROR: install should have been refused'; exit 1
          fi
          rpm -q llm-systems-manager && exit 1
          rm -f /etc/systemd/system/llm-systems-manager.service
          rm -rf /opt/llm-systems-manager

      # EL9's default python3 is 3.9 — the postinst picker must find 3.11.
      - name: Install .rpm
        run: |
          dnf install -y ./dist/llm-systems-manager-0.0.1-1.noarch.rpm

      - name: Assert install state
        run: |
          set -x
          getent passwd llmsys
          test -f /usr/lib/systemd/system/llm-systems-manager.service
          test -f /usr/lib/systemd/system/llm-systems-alarm-engine.service
          test -f /etc/sudoers.d/llm-systems-manager
          /opt/llm-systems-manager/llm-systems-manager/venv/bin/python3 -c 'import sys; assert sys.version_info >= (3, 10)'
          /opt/llm-systems-manager/llm-systems-alarm-engine/venv/bin/python3 -c 'import sys; assert sys.version_info >= (3, 10)'
          stat -c '%U %a' /opt/llm-systems-manager/config/llm-systems.toml | grep -qx 'llmsys 600'

      # No systemd in the container — run the manager exactly as the unit
      # would (WorkingDirectory + LLM_SYSTEMS_CONFIG) and hit /health.
      - name: Direct-launch health check
        run: |
          cd /opt/llm-systems-manager/llm-systems-manager
          runuser -u llmsys -- env LLM_SYSTEMS_CONFIG=/opt/llm-systems-manager/config/llm-systems.toml \
            venv/bin/python3 backend/llm-systems-manager.py > /tmp/manager.log 2>&1 &
          MGR_PID=$!
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:5000/health >/dev/null 2>&1 && break
            sleep 2
          done
          curl -fsS http://127.0.0.1:5000/health
          kill "$MGR_PID"

      - name: Erase → generated artifacts removed
        run: |
          dnf remove -y llm-systems-manager
          set -x
          test ! -e /opt/llm-systems-manager/llm-systems-manager/venv
          test ! -e /opt/llm-systems-manager/llm-systems-alarm-engine/venv
          test ! -e /usr/lib/systemd/system/llm-systems-manager.service
          test -f /opt/llm-systems-manager/config/llm-systems.toml

      - name: Show manager log on failure
        if: failure()
        run: cat /tmp/manager.log || true
