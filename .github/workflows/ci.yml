name: CI

# Runs on every push to main and every pull request targeting main.
# - test: pytest across the alarm-engine + manager suites. BLOCKING.
# - lint: ruff (pyflakes ruleset). BLOCKING — new findings should be fixed
#   in the PR that introduces them rather than letting drift accumulate.
#
# Intentionally deferred:
#   * mypy — most modules aren't type-annotated; running it broadly would
#     drown signal in noise. Worth wiring once the codebase grows type
#     hints in a few seed modules (storage/, models/, _time.py).
#   * smoke tests (tools/llm-systems-*_smoke_test.sh) — they need a full
#     integration environment: docker-compose InfluxDB + AE + manager +
#     config TOML + admin password + AE TLS cert chain. Self-contained
#     enough to warrant its own follow-up PR.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a PR gets a new push, so we don't spend
# CPU on superseded commits.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # CLAUDE.md operating rule #1 isn't tied to a Python minor; the
          # installer requires >= 3.10. Use 3.12 here — it's the modern
          # baseline ubuntu-latest ships with and matches the prod venvs.
          python-version: "3.12"
          cache: pip

      # config/unified_config.py and config/llm-systems.toml are gitignored
      # because the live install holds secrets and is provisioned by
      # install-config-bootstrap.sh. CI doesn't go through the installer,
      # so we materialise the loader from its tracked .example. The loader
      # itself supports a missing TOML (falls back to schema defaults — see
      # CLAUDE.md "Missing file → all defaults"), so a real TOML isn't
      # needed for tests to import settings.
      - name: Materialise config loader
        run: cp config/unified_config.py.example config/unified_config.py

      - name: Install alarm engine dependencies
        working-directory: llm-systems-alarm-engine
        run: |
          python -m venv venv
          venv/bin/python -m pip install --upgrade pip
          venv/bin/python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Install manager dependencies
        working-directory: llm-systems-manager
        run: |
          python -m venv venv
          venv/bin/python -m pip install --upgrade pip
          venv/bin/python -m pip install -r backend/requirements.txt -r requirements-dev.txt

      - name: Run alarm engine tests
        working-directory: llm-systems-alarm-engine
        run: venv/bin/python -m pytest -v

      # The manager module configures file logging at import time pointed at
      # /var/log/llm-systems-manager (per the production install layout). CI
      # runs as a non-root user that can't create that dir on its own, so
      # provision it up front. This also matches what install-manager.sh
      # does on a real host.
      - name: Provision manager log dir
        run: |
          sudo mkdir -p /var/log/llm-systems-manager
          sudo chown "$USER" /var/log/llm-systems-manager

      - name: Run manager tests
        working-directory: llm-systems-manager
        run: venv/bin/python -m pytest -v

  agent-test:
    name: pytest (agent)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # The agent suite loads leaf modules with stubbed deps (agent/tests/
    # conftest.py + per-test importlib loads), so it needs only pytest — no
    # requirements install and no config loader materialisation.
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pytest
        run: pip install pytest

      - name: Run agent tests
        working-directory: agent
        run: python -m pytest -v

  installer-test:
    name: pytest (installer)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # toml_reconcile.py is stdlib-only (tomllib), so pytest is the only dep.
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pytest
        run: pip install pytest

      - name: Run installer helper tests
        working-directory: tools/installer
        run: python -m pytest -v

  lint:
    name: ruff
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Blocking. The codebase was cleaned in chore/ruff-cleanup; new
    # findings should be addressed in the PR that introduces them rather
    # than letting drift accumulate.
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      # Scope: just the three service codebases. Exclude vendored dirs,
      # the frontend HTML, and anything in tools/ that's shell-only.
      - name: Run ruff
        run: |
          ruff check \
            --select=F \
            --exclude=venv \
            --exclude=__pycache__ \
            --exclude=node_modules \
            --output-format=github \
            llm-systems-alarm-engine/backend \
            llm-systems-manager/backend \
            agent

  js-test:
    name: vitest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Frontend unit tests (vitest). Buildless, dev-only deps. BLOCKING.
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: llm-systems-manager/frontend/package-lock.json

      - name: Install frontend dev dependencies
        working-directory: llm-systems-manager/frontend
        run: npm ci

      - name: Run frontend unit tests
        working-directory: llm-systems-manager/frontend
        run: npm test

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Static analysis for the installer/packaging/agent-install shell. BLOCKING.
    # Pinned shellcheck so findings are reproducible across runner-image bumps.
    # -S info (not warning) so it also catches SC2086 (unquoted / word-splitting)
    # and SC2251 (a `! cmd` that silently skips errexit). Excluded codes are
    # deliberate idioms or analysis limits here: SC2015 (A && B || C fallbacks),
    # SC2016 (single-quoted trap / awk bodies), SC1091 (un-followable sources).
    # The assembled step also drops SC2317 (common.sh helpers look unreachable
    # when concatenated with just one fragment).
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck (pinned)
        run: |
          ver=0.10.0
          curl -fsSL "https://github.com/koalaman/shellcheck/releases/download/v${ver}/shellcheck-v${ver}.linux.x86_64.tar.xz" | tar -xJ
          sudo install "shellcheck-v${ver}/shellcheck" /usr/local/bin/shellcheck
          shellcheck --version

      # Standalone shell (real shebang): .sh files, the .sh.tmpl rendered at
      # install time, and the #!/bin/sh debconf/config maintainer scripts.
      # -x follows the `. lib-common.sh` sources so cross-file refs resolve.
      - name: Shellcheck standalone scripts
        run: |
          mapfile -t scripts < <(git ls-files -- tools/installer tools/packaging agent/install | grep -E '\.sh$|\.sh\.tmpl$|/debconf/config$')
          printf 'linting %d scripts\n' "${#scripts[@]}"
          shellcheck -S info -e SC2015,SC2016,SC1091 -x "${scripts[@]}"

      # The .deb/.rpm maintainer scripts are shebang-less fragments that the
      # build concatenates onto scripts/common.sh; lint the assembled artifact
      # (common.sh + fragment) so common.sh's helpers are in scope. Mirrors the
      # concatenation in build-packages.sh / build-agent-package.sh.
      - name: Shellcheck assembled maintainer scripts
        run: |
          tmp="$(mktemp -d)"
          for base in tools/packaging tools/packaging/agent; do
            for s in deb/preinst deb/postinst deb/prerm deb/postrm \
                     rpm/pre rpm/post rpm/preun rpm/postun; do
              cat "$base/scripts/common.sh" "$base/scripts/$s" > "$tmp/$(echo "$base/$s" | tr '/' '-')"
            done
          done
          shellcheck -S info -e SC2015,SC2016,SC1091,SC2317 "$tmp"/*

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Lints the workflow files themselves (syntax, expressions, deprecations)
    # and runs shellcheck over every run: block — the layer that guards the
    # CI scripts the installer shellcheck job doesn't see. BLOCKING. Both tools
    # pinned so a runner-image bump can't silently change the gate.
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck (pinned)
        run: |
          ver=0.10.0
          curl -fsSL "https://github.com/koalaman/shellcheck/releases/download/v${ver}/shellcheck-v${ver}.linux.x86_64.tar.xz" | tar -xJ
          sudo install "shellcheck-v${ver}/shellcheck" /usr/local/bin/shellcheck

      - name: Install actionlint (pinned)
        run: |
          ver=1.7.7
          curl -fsSL "https://github.com/rhysd/actionlint/releases/download/v${ver}/actionlint_${ver}_linux_amd64.tar.gz" | tar -xz actionlint
          sudo install actionlint /usr/local/bin/actionlint
          actionlint --version

      # actionlint pipes run: blocks to shellcheck but silently SKIPS them (and
      # still exits 0) if the binary is missing — so assert it and pass the path
      # explicitly rather than trusting auto-detect.
      - name: actionlint
        run: |
          command -v shellcheck
          actionlint -shellcheck "$(command -v shellcheck)"

  compose-env-completeness:
    name: compose env completeness (#396 guard)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Every LSM_* consumed inside the containers (render-config.sh + the
    # entrypoints) must be forwarded by docker-compose.yml's x-lsm-env anchor,
    # or setting it in .env silently does nothing — the #396 bug class.
    # Allowlisted: compose-internal defaults never meant to be overridden.
    steps:
      - uses: actions/checkout@v4

      - name: Consumed LSM_ vars are all forwarded by the x-lsm-env anchor
        run: |
          consumed="$(grep -hoE '\$\{LSM_[A-Z0-9_]+' docker/render-config.sh docker/entrypoint-*.sh | sed 's/^..//' | sort -u)"
          anchor="$(awk '/^x-lsm-env:/{f=1;next} f&&/^[^ ]/{f=0} f' docker-compose.yml | grep -oE '^  LSM_[A-Z0-9_]+:' | tr -d ' :' | sort -u)"
          [ -n "$consumed" ] || { echo '::error::extraction broke — no LSM_ vars found in docker/'; exit 1; }
          [ -n "$anchor" ]   || { echo '::error::extraction broke — no LSM_ keys found in the x-lsm-env anchor'; exit 1; }
          allow_re='^(LSM_INFLUX_HOST|LSM_INFLUX_PORT|LSM_MANAGER_URL)$'
          missing="$(comm -23 <(printf '%s\n' "$consumed" | grep -vE "$allow_re" || true) <(printf '%s\n' "$anchor"))"
          if [ -n "$missing" ]; then
            echo "::error::consumed in docker/ but NOT forwarded by the x-lsm-env anchor (setting them in .env does nothing):"
            printf '%s\n' "$missing"
            exit 1
          fi
          printf 'OK: %s consumed vars covered (%s allowlisted as compose-internal)\n' \
            "$(printf '%s\n' "$consumed" | wc -l)" "$(printf '%s\n' "$consumed" | grep -cE "$allow_re" || true)"
