name: Brew install test

# Real user path against the published tap + latest release: tap, install,
# service health, uninstall — agent + control plane (manager + alarm engine),
# each on macOS and Linux. Nightly + manual only — PRs here cannot change
# already-released assets, so a PR trigger would test nothing new.

on:
  schedule:
    - cron: "41 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: brew-install-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  agent:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: llmsyscore/homebrew-tap/.github/actions/setup-brew-ci@main
        with:
          tap: llmsyscore/tap
      - uses: llmsyscore/homebrew-tap/.github/actions/install-test@main
        with:
          formula: llmsyscore/tap/llm-systems-agent

  control-plane:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: llmsyscore/homebrew-tap/.github/actions/setup-brew-ci@main
        with:
          tap: llmsyscore/tap
      - uses: llmsyscore/homebrew-tap/.github/actions/manager-install-test@main
