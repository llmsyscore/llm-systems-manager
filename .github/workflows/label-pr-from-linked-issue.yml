name: Label PR from linked issue

# .github/release.yml buckets PRs into release-notes sections by PR label, but
# this repo's work-intake workflow (CLAUDE.md §7) only labels the ISSUE, not
# the PR that closes it — so every PR would land in the catch-all bucket.
# This copies the release-relevant labels (bug/enhancement/documentation) from
# every issue a PR closes ("Closes #N" / "Fixes #N" / "Resolves #N" in the PR
# body) onto the PR itself.

on:
  pull_request_target:
    types: [opened, edited, reopened, ready_for_review]

permissions:
  pull-requests: write
  issues: read

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Copy release-relevant labels from linked issues
        uses: actions/github-script@v7
        with:
          script: |
            const RELEASE_LABELS = new Set(["bug", "enhancement", "documentation"]);
            const body = context.payload.pull_request.body || "";
            const re = /\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s*:?\s*#(\d+)/gi;
            const issueNumbers = new Set();
            let m;
            while ((m = re.exec(body)) !== null) {
              issueNumbers.add(Number(m[1]));
            }
            if (issueNumbers.size === 0) {
              console.log("No linked issues found in PR body — nothing to copy.");
              return;
            }

            const toAdd = new Set();
            for (const num of issueNumbers) {
              try {
                const { data: issue } = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: num,
                });
                for (const label of issue.labels) {
                  const name = typeof label === "string" ? label : label.name;
                  if (RELEASE_LABELS.has(name)) toAdd.add(name);
                }
              } catch (e) {
                console.log(`Could not read issue #${num}: ${e.message}`);
              }
            }

            if (toAdd.size === 0) {
              console.log("Linked issue(s) carry no release-relevant labels.");
              return;
            }

            console.log(`Adding labels to PR #${context.payload.pull_request.number}: ${[...toAdd].join(", ")}`);
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: [...toAdd],
            });
