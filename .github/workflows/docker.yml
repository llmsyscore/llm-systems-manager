name: Docker

# PR gate for the container packaging (#384): build both images from source and
# prove `docker compose up` yields a working manager + alarm engine + InfluxDB.

on:
  pull_request:
    paths:
      - "docker/**"
      - "docker-compose.yml"
      - ".dockerignore"
      - ".env.example"
      - ".github/workflows/docker.yml"
      - "llm-systems-manager/backend/requirements.txt"
      - "llm-systems-alarm-engine/requirements.txt"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compose-smoke:
    name: build images + compose up smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Create .env
        run: |
          {
            echo "LSM_INFLUX_PASSWORD=$(openssl rand -hex 12)"
            echo "LSM_INFLUX_TOKEN=$(openssl rand -hex 32)"
            echo "LSM_AE_INGEST_TOKEN=$(openssl rand -hex 32)"
            echo "LSM_MANAGER_PUBLIC_HOST=192.168.99.99"
          } > .env

      - name: Build images + bring the stack up
        run: docker compose up -d --build --wait --wait-timeout 300

      - name: Manager health
        run: curl -fsS http://localhost:5000/health

      - name: Alarm engine health (HTTPS via manager-issued cert, HTTP fallback)
        run: |
          if curl -fsSk https://localhost:8081/health; then
            echo "alarm engine serving HTTPS"
            echo "AE_SCHEME=https" >> "$GITHUB_ENV"
          else
            echo "::warning::alarm engine fell back to HTTP"
            curl -fsS http://localhost:8081/health
            echo "AE_SCHEME=http" >> "$GITHUB_ENV"
          fi

      - name: AE TLS cert issued into the shared volume
        run: |
          for _ in $(seq 1 12); do
            docker compose exec -T alarm-engine test -s data/ae-tls.crt && exit 0
            sleep 5
          done
          echo "ae-tls.crt never appeared in the shared volume" >&2
          exit 1

      - name: InfluxDB buckets provisioned (rollup self-created by the AE)
        run: |
          for _ in $(seq 1 12); do
            docker compose exec -T influxdb influx bucket list --json > /tmp/buckets.json
            grep -q alarm_engine_metrics /tmp/buckets.json \
              && grep -q alarm_engine_metrics_rollup /tmp/buckets.json && exit 0
            sleep 5
          done
          cat /tmp/buckets.json
          echo "rollup bucket not provisioned by the alarm engine" >&2
          exit 1

      - name: Metric ingest end-to-end (agent-style batch POST → AE)
        run: |
          . ./.env
          curl -fsSk -X POST "$AE_SCHEME://localhost:8081/api/alarm/metrics/batch" \
            -H "Authorization: Bearer $LSM_AE_INGEST_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"metrics":[{"source":"cpu","metric_name":"cpu_usage","value":42.0,"unit":"%","hostname":"ci-smoke"}]}'

      - name: Dashboard login (llmadmin) + admin route reachable
        run: |
          jar=$(mktemp)
          login=$(curl -s -o /dev/null -w '%{http_code}' -c "$jar" \
            --data-urlencode username=llmadmin --data-urlencode password=llmadmin \
            http://localhost:5000/login)
          echo "login -> HTTP $login"
          # Successful login always 302-redirects to /; a failed one renders 401.
          [ "$login" = "302" ] || { echo "llmadmin/llmadmin login failed" >&2; exit 1; }
          admin=$(curl -s -o /dev/null -w '%{http_code}' -b "$jar" \
            http://localhost:5000/api/admin/audit-log)
          echo "admin route -> HTTP $admin"
          [ "$admin" = "200" ] || { echo "admin route not reachable as llmadmin (got $admin)" >&2; exit 1; }

      - name: Manager TLS cert covers LSM_MANAGER_PUBLIC_HOST
        run: |
          crt=/opt/llm-systems-manager/data/manager-tls.crt
          ok=""
          for _ in $(seq 1 12); do
            docker compose exec -T manager test -s "$crt" && ok=1 && break
            sleep 5
          done
          [ -n "$ok" ] || { echo "manager cert never appeared at $crt" >&2; exit 1; }
          docker compose cp manager:"$crt" /tmp/mtls.crt
          openssl x509 -in /tmp/mtls.crt -noout -ext subjectAltName | tee /tmp/san.txt
          grep -q "192.168.99.99" /tmp/san.txt \
            || { echo "public host missing from manager cert SAN" >&2; exit 1; }

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down
        if: always()
        run: docker compose down -v

  # The compose smoke is amd64-only; this catches arm64-only failures
  # (e.g. missing wheels forcing source builds) before a release tag does.
  arm64-build:
    name: arm64 image build (no push)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Build both targets for linux/arm64
        run: |
          for target in manager alarm-engine; do
            docker buildx build --file docker/Dockerfile --target "$target" \
              --platform linux/arm64 .
          done
