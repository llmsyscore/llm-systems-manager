name: Install tests

# Installer integration tests (#25): exercise tools/installer/install.sh
# end-to-end on a systemd-capable VM runner.
# - fresh-install: mode 1 (manager + alarm engine + InfluxDB + local agent)
#   from the PR tree, then the ci-smoke oracle.
# - upgrade: install the PR's base commit, then update.sh to the PR head;
#   update.sh itself asserts each service self-reports the new version,
#   and ci-smoke re-verifies. This is the only job that catches the
#   "new agent/*.py missing from an install file-list → crash-loop only
#   after upgrade" class of bug (gotcha #24).
# - release-install: mode 1 through the DEFAULT source path — a checksum-
#   verified release tarball built (and served over file://) exactly like
#   release.yml. The other two jobs use the local checkout / a preset
#   REPO_SRC, so this is the only job that runs acquire_source_tree +
#   fetch_release_tree, and it catches files git archive drops that a real
#   install needs (#383).
#
# Heavy (~15 min/job), so gated by paths: to installer/agent/requirements
# changes; use workflow_dispatch for a manual run on anything else. A
# nightly schedule catches drift against upstream package repos.

on:
  pull_request:
    branches: [main]
    paths:
      - "tools/installer/**"
      - "agent/**"
      - "**/requirements*.txt"
      - ".github/workflows/install-test.yml"
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

concurrency:
  group: install-test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fresh-install:
    name: fresh install (mode 1)
    runs-on: ubuntu-latest
    # Covers the initial install AND a reinstall-over-stale-tree pass (#352).
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # Non-TTY runs refuse to auto-apt missing prerequisites; provide them
      # up front (the rest of the runner image already has git/curl/python3).
      - name: Install prerequisites
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            jq rsync wget gnupg ca-certificates openssl sqlite3 \
            python3-venv python3-pip python3-dev build-essential

      # Non-interactive: prompts take detected defaults, services start by
      # default, and the local agent installs after the manager is up.
      # --no-self-update pins the run to the PR's installer, not upstream's.
      - name: Run installer (mode 1)
        run: sudo bash tools/installer/install.sh --mode 1 --no-self-update < /dev/null

      - name: Smoke test
        run: sudo bash tools/installer/ci-smoke.sh

      # Mode 1 installs + starts a local agent pointed at the LAN IP, so it
      # registers "pending". Verify it registers, gets admin-approved, reports,
      # and upgrades to full TLS (local HTTPS serve + control-channel flip).
      - name: Verify agent registers, is approved, and upgrades to full TLS
        run: sudo bash tools/installer/ci-agent-tls-smoke.sh

      # Reinstall coverage (#352): plant every manifest entry as stale state,
      # re-run install.sh over the live tree, and assert the deploy pruned it.
      - name: Plant stale upstream-removed artifacts (reinstall fixture)
        run: sudo bash tools/installer/ci-plant-stale-fixture.sh tools/installer/removed-paths.manifest

      - name: Reinstall over existing tree (mode 1)
        run: sudo bash tools/installer/install.sh --mode 1 --no-self-update < /dev/null

      - name: Smoke test (post-reinstall)
        run: sudo bash tools/installer/ci-smoke.sh

      # DESTRUCTIVE steps — keep LAST. Malformed-config breaks then restores the
      # agent; uninstall then removes everything. Both need the full install.
      - name: Agent malformed-config does not restart-loop (exit 2)
        run: sudo bash tools/installer/ci-agent-malformed-config.sh

      - name: Full-script uninstall leaves a clean host
        run: sudo bash tools/installer/ci-uninstall-smoke.sh

      - name: Collect service logs on failure
        if: failure()
        run: |
          for u in influxdb llm-systems-alarm-engine llm-systems-manager llm-systems-agent; do
            echo "════ journalctl -u $u ════"
            sudo journalctl -u "$u" -n 200 --no-pager || true
          done

  upgrade:
    name: upgrade (base → head)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      # On pull_request, base.sha is the upgrade-from baseline; scheduled and
      # manual runs fall back to main → main (a no-op-update drift check).
      - name: Checkout base (upgrade-from)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha || 'main' }}
          path: base

      - name: Checkout head (upgrade-to)
        uses: actions/checkout@v4
        with:
          path: head

      - name: Install prerequisites
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            jq rsync wget gnupg ca-certificates openssl sqlite3 \
            python3-venv python3-pip python3-dev build-essential

      - name: Install baseline (mode 1)
        working-directory: base
        run: sudo bash tools/installer/install.sh --mode 1 --no-self-update < /dev/null

      - name: Record pre-upgrade manager version
        run: |
          curl -fsS -m 10 http://127.0.0.1:5000/health | jq -r .version | tee /tmp/version-before

      # Plants every manifest `file` entry (plus fake bytecode) and two removed
      # TOML keys as stale state; ci-smoke asserts absence after the upgrade.
      - name: Plant stale upstream-removed artifacts
        run: sudo bash head/tools/installer/ci-plant-stale-fixture.sh head/tools/installer/removed-paths.manifest

      # REPO_SRC points update.sh at the PR-head checkout so it deploys the
      # code under test instead of cloning upstream main. --yes auto-confirms
      # the per-component sync/restart prompts; update.sh then verifies each
      # restarted service self-reports the freshly deployed version and
      # exits non-zero on mismatch or failed units.
      - name: Upgrade to head
        run: sudo REPO_SRC="$GITHUB_WORKSPACE/head" bash head/tools/installer/update.sh --yes

      - name: Smoke test (post-upgrade)
        run: sudo bash head/tools/installer/ci-smoke.sh

      - name: Assert manager runs the head version
        run: |
          want="$(grep -E '^__version__' head/llm-systems-manager/backend/llm-systems-manager.py | sed -E 's/.*"([^"]+)".*/\1/')"
          got="$(curl -fsS -m 10 http://127.0.0.1:5000/health | jq -r .version)"
          echo "before=$(cat /tmp/version-before) after=$got head-source=$want"
          test "$got" = "$want"

      - name: Collect service logs on failure
        if: failure()
        run: |
          for u in influxdb llm-systems-alarm-engine llm-systems-manager llm-systems-agent; do
            echo "════ journalctl -u $u ════"
            sudo journalctl -u "$u" -n 200 --no-pager || true
          done

  release-install:
    name: release-tarball install (mode 1)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # TAG is a throwaway CI-only version; the tarball is built + served
    # locally, never published. Matches the installer's asset-name contract:
    # llm-systems-manager-<tag>.tar.gz with a llm-systems-manager-<tag>/ prefix.
    env:
      TAG: v0.0.0-ci
    steps:
      - uses: actions/checkout@v4

      - name: Install prerequisites
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            jq rsync wget gnupg ca-certificates openssl sqlite3 \
            python3-venv python3-pip python3-dev build-essential

      # Build the tarball + checksum exactly like release.yml, so this job
      # doubles as a smoke test of the release artifact itself.
      - name: Build release tarball + checksum
        run: |
          ASSET="llm-systems-manager-${TAG}.tar.gz"
          mkdir -p "${RUNNER_TEMP}/serve/${TAG}"
          git archive --format=tar.gz \
            --prefix="llm-systems-manager-${TAG}/" \
            -o "${RUNNER_TEMP}/serve/${TAG}/${ASSET}" HEAD
          ( cd "${RUNNER_TEMP}/serve/${TAG}" && sha256sum "$ASSET" | tee "$ASSET.sha256" )

      # git archive honors .gitattributes export-ignore and drops untracked
      # files; assert the archive still carries files a real install needs.
      - name: Assert tarball completeness
        run: |
          ASSET="${RUNNER_TEMP}/serve/${TAG}/llm-systems-manager-${TAG}.tar.gz"
          for f in tools/installer/removed-paths.manifest \
                   tools/installer/toml_reconcile.py \
                   config/llm-systems.toml.example; do
            tar -tzf "$ASSET" | grep -qx "llm-systems-manager-${TAG}/$f" \
              || { echo "MISSING from release tarball: $f"; exit 1; }
          done

      # Run install.sh from OUTSIDE the checkout so it takes the release path;
      # a local git tree would trigger the use-local-checkout branch instead.
      # file:// base URL + pinned tag serve the just-built tarball to curl.
      - name: Install from release tarball (mode 1)
        run: |
          cp tools/installer/install.sh "${RUNNER_TEMP}/install.sh"
          sudo LLMSYS_RELEASE_TAG="${TAG}" \
               LLMSYS_RELEASE_BASE_URL="file://${RUNNER_TEMP}/serve" \
               bash "${RUNNER_TEMP}/install.sh" --mode 1 --no-self-update < /dev/null

      - name: Smoke test
        run: sudo bash tools/installer/ci-smoke.sh

      - name: Collect service logs on failure
        if: failure()
        run: |
          for u in influxdb llm-systems-alarm-engine llm-systems-manager llm-systems-agent; do
            echo "════ journalctl -u $u ════"
            sudo journalctl -u "$u" -n 200 --no-pager || true
          done

  split-install:
    name: split install (modes 3 + 4)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Cross-host split install on ONE runner: mode 4 (alarm engine) into one
    # tree, mode 3 (manager) into another. Both installs share the runner's IP,
    # so the config-bootstrap non-interactive branch auto-wires the two URLs.
    # ci-split-smoke.sh then does the operator's manual steps (activate the AE
    # tokens, paste them into the manager, use the manager-issued TLS cert) and
    # asserts the manager->AE token/proxy/CORS/TLS wiring — the mode-3/4 branches
    # and split-mode coupling the mode-1 jobs structurally cannot reach.
    steps:
      - uses: actions/checkout@v4

      - name: Install prerequisites
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            jq rsync wget gnupg ca-certificates openssl sqlite3 \
            python3-venv python3-pip python3-dev build-essential

      # Both installs must resolve to the SAME address so their auto-wired URLs,
      # CORS lists, and the AE cert SAN all agree. Reject an empty/link-local IP.
      - name: Pick the shared runner IP
        run: |
          ip="$(hostname -I | awk '{print $1}')"
          case "${ip:-}" in
            ""|169.254.*) echo "no routable runner IP: '${ip:-}'"; exit 1 ;;
          esac
          echo "DETECTED_IP=$ip" >> "$GITHUB_ENV"
          echo "shared runner IP: $ip"

      # Alarm-engine-only. No InfluxDB on the runner, so resolve-influxdb.sh
      # takes its non-interactive skip path; the AE serves plain HTTP (no cert
      # yet) and its /health returns 200 regardless, so the install passes.
      - name: Install alarm engine (mode 4)
        run: sudo LLMSYS_INSTALL_DIR=/opt/llm-systems-manager-ae bash tools/installer/install.sh --mode 4 --no-self-update < /dev/null

      # Manager-only. On start it auto-issues the AE TLS cert into its own data
      # dir (the AE is remote) and health-checks only itself.
      - name: Install manager (mode 3)
        run: sudo LLMSYS_INSTALL_DIR=/opt/llm-systems-manager-mgr bash tools/installer/install.sh --mode 3 --no-self-update < /dev/null

      # A remote monitoring agent pointed at the mode-3 manager's LAN IP — the
      # real split shape (registers "pending", not loopback-auto-approved). Wait
      # for the manager to answer before installing (the agent's own probe is
      # only 3×5s before it hard-exits on non-TTY stdin).
      - name: Install monitoring agent pointed at the mode-3 manager
        run: |
          for _ in $(seq 1 30); do
            c="$(curl -sS -o /dev/null -w '%{http_code}' -m5 "http://$DETECTED_IP:5000/api/agents" || echo 000)"
            case "$c" in 200|401|403) break ;; esac
            sleep 1
          done
          # Run the agent installer from the manager's DEPLOYED tree (/opt-mgr,
          # llmsys-readable). `install.sh --mode 5` installs from the raw GH
          # checkout under the runner's HOME, which the llmsys pip step can't read.
          sudo bash /opt/llm-systems-manager-mgr/agent/install/install.sh \
            --manager-url "http://$DETECTED_IP:5000" --hostname ci-split-agent < /dev/null

      # Approve + full-TLS verification. Admin HTTP calls stay on loopback
      # (127.0.0.1 is always in admin_cidrs); the agent itself dials the LAN IP.
      - name: Verify agent registers, is approved, and upgrades to full TLS
        run: sudo MGR_URL=http://127.0.0.1:5000 AGENT_HOSTNAME=ci-split-agent bash tools/installer/ci-agent-tls-smoke.sh

      - name: Wire the two hosts and assert cross-host coupling
        run: |
          sudo AE_DIR=/opt/llm-systems-manager-ae \
               MGR_DIR=/opt/llm-systems-manager-mgr \
               DETECTED_IP="$DETECTED_IP" \
               bash tools/installer/ci-split-smoke.sh

      - name: Collect service logs on failure
        if: failure()
        run: |
          for u in llm-systems-alarm-engine llm-systems-manager llm-systems-agent; do
            echo "════ journalctl -u $u ════"
            sudo journalctl -u "$u" -n 200 --no-pager || true
          done

  source-local-install:
    name: --source local install (mode 1, offline source)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # The air-gapped path (#389/#408): install from an extracted source tree,
    # no download, no clone, no self-update. Simulated exactly like a real
    # operator: git archive (same as the release tarball) extracted to a
    # neutral dir, then that tree's own install.sh --source local.
    steps:
      - uses: actions/checkout@v4

      - name: Install prerequisites
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            jq rsync wget gnupg ca-certificates openssl sqlite3 \
            python3-venv python3-pip python3-dev build-essential

      - name: Extract a release-style source tree
        run: |
          mkdir -p "${RUNNER_TEMP}/extract"
          git archive --format=tar HEAD | tar -x -C "${RUNNER_TEMP}/extract"
          test -f "${RUNNER_TEMP}/extract/tools/installer/lib-common.sh"

      - name: Install from the local tree (mode 1, --source local)
        run: |
          sudo bash "${RUNNER_TEMP}/extract/tools/installer/install.sh" \
            --mode 1 --source local < /dev/null 2>&1 | tee /tmp/local-install.log

      - name: Assert the offline path was actually taken
        run: |
          # The local branch prints this line and never stages a clone/tarball.
          grep -F 'using local source tree (offline)' /tmp/local-install.log
          test ! -e /tmp/llm-systems-manager-install
          # --source local implies no self-update: neither the re-exec nor the
          # "couldn't reach GitHub" fallback may appear (no --no-self-update
          # was passed, so a regression here would try to phone home).
          if grep -E 'newer install.sh upstream|self-update check skipped' /tmp/local-install.log; then
            echo 'ERROR: --source local attempted a self-update phone-home'; exit 1
          fi
          # The operator's tree must be preserved, never consumed (install.sh
          # only deletes staging trees it created).
          test -f "${RUNNER_TEMP}/extract/tools/installer/lib-common.sh"

      - name: Smoke test
        run: sudo bash tools/installer/ci-smoke.sh

      - name: Collect service logs on failure
        if: failure()
        run: |
          for u in influxdb llm-systems-alarm-engine llm-systems-manager llm-systems-agent; do
            echo "════ journalctl -u $u ════"
            sudo journalctl -u "$u" -n 200 --no-pager || true
          done

  source-git-install:
    name: --source git install (mode 1, clone main)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # The clone-main path. Hermetic: a url.insteadOf redirect points the
    # installer's fixed https URL at a local repo serving THIS PR's tree, so
    # the job tests the PR's code (not upstream main) and needs no network for
    # the clone. install.sh runs as a lone copied file (like a curl'd
    # bootstrap) — from inside a checkout the local-checkout auto-detect would
    # win and the git path would never run.
    steps:
      - uses: actions/checkout@v4

      - name: Install prerequisites
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            jq rsync wget gnupg ca-certificates openssl sqlite3 \
            python3-venv python3-pip python3-dev build-essential

      - name: Serve this PR's tree as the repo's main branch
        run: |
          rsync -a --exclude .git ./ "${RUNNER_TEMP}/serve-src/"
          git -C "${RUNNER_TEMP}/serve-src" init -q -b main
          git -C "${RUNNER_TEMP}/serve-src" -c user.email=ci@local -c user.name=ci add -A
          git -C "${RUNNER_TEMP}/serve-src" -c user.email=ci@local -c user.name=ci commit -qm "ci source"
          # System-level so root's git (under sudo) sees it too.
          sudo git config --system \
            url."file://${RUNNER_TEMP}/serve-src".insteadOf \
            "https://github.com/llmsyscore/llm-systems-manager.git"

      - name: Install via git clone (mode 1, --source git)
        run: |
          cp tools/installer/install.sh "${RUNNER_TEMP}/install.sh"
          sudo bash "${RUNNER_TEMP}/install.sh" \
            --mode 1 --source git --no-self-update < /dev/null 2>&1 | tee /tmp/git-install.log

      - name: Assert the git path was actually taken and deployed THIS tree
        run: |
          grep -F 'cloned llmsyscore/llm-systems-manager' /tmp/git-install.log
          test -d /tmp/llm-systems-manager-install/.git
          # The deployed backend must be byte-identical to the PR checkout —
          # proves the clone served the PR's code, not some other source.
          sudo cmp llm-systems-manager/backend/llm-systems-manager.py \
            /opt/llm-systems-manager/llm-systems-manager/backend/llm-systems-manager.py

      - name: Smoke test
        run: sudo bash tools/installer/ci-smoke.sh

      - name: Collect service logs on failure
        if: failure()
        run: |
          for u in influxdb llm-systems-alarm-engine llm-systems-manager llm-systems-agent; do
            echo "════ journalctl -u $u ════"
            sudo journalctl -u "$u" -n 200 --no-pager || true
          done
