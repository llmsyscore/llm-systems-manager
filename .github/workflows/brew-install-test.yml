name: Brew install test

# Real user path against the published tap + latest release: tap, install,
# service health, uninstall — agent on macOS + Linux, control plane
# (manager + alarm engine) on both. Nightly + manual only — PRs here cannot
# change already-released assets, so a PR trigger would test nothing new.

on:
  schedule:
    - cron: "41 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: brew-install-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  agent:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - name: Set up Homebrew (Linux)
        if: runner.os == 'Linux'
        uses: Homebrew/actions/setup-homebrew@master
      - name: Tap
        run: |
          brew tap llmsyscore/tap
          brew trust llmsyscore/tap || true
      - uses: llmsyscore/homebrew-tap/.github/actions/systemd-user-session@main
      - uses: llmsyscore/homebrew-tap/.github/actions/install-test@main
        with:
          formula: llmsyscore/tap/llm-systems-agent

  control-plane:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - name: Set up Homebrew (Linux)
        if: runner.os == 'Linux'
        uses: Homebrew/actions/setup-homebrew@master
      - name: Tap
        run: |
          brew tap llmsyscore/tap
          brew trust llmsyscore/tap || true
      - uses: llmsyscore/homebrew-tap/.github/actions/systemd-user-session@main
      - uses: llmsyscore/homebrew-tap/.github/actions/manager-install-test@main
