name: Docker

# PR gate for the container packaging (#384): build both images from source and
# prove `docker compose up` yields a working manager + alarm engine + InfluxDB.

on:
  pull_request:
    paths:
      - "docker/**"
      - "docker-compose.yml"
      - ".dockerignore"
      - ".env.example"
      - ".github/workflows/docker.yml"
      - "llm-systems-manager/backend/requirements.txt"
      - "llm-systems-alarm-engine/requirements.txt"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compose-smoke:
    name: build images + compose up smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Create .env
        run: |
          {
            echo "LSM_INFLUX_PASSWORD=$(openssl rand -hex 12)"
            echo "LSM_INFLUX_TOKEN=$(openssl rand -hex 32)"
            echo "LSM_AE_INGEST_TOKEN=$(openssl rand -hex 32)"
            echo "LSM_MANAGER_PUBLIC_HOST=192.168.99.99"
            # Locally-built images — never re-pull from ghcr (#433 pull_policy).
            echo "LSM_PULL_POLICY=missing"
          } > .env

      - name: Build images + bring the stack up
        run: docker compose up -d --build --wait --wait-timeout 300

      - name: Manager health
        run: curl -fsS http://localhost:5000/health

      - name: Alarm engine health (HTTPS via manager-issued cert, HTTP fallback)
        run: |
          if curl -fsSk https://localhost:8081/health; then
            echo "alarm engine serving HTTPS"
            echo "AE_SCHEME=https" >> "$GITHUB_ENV"
          else
            echo "::warning::alarm engine fell back to HTTP"
            curl -fsS http://localhost:8081/health
            echo "AE_SCHEME=http" >> "$GITHUB_ENV"
          fi

      - name: AE TLS cert issued into the shared volume
        run: |
          for _ in $(seq 1 12); do
            docker compose exec -T alarm-engine test -s data/ae-tls.crt && exit 0
            sleep 5
          done
          echo "ae-tls.crt never appeared in the shared volume" >&2
          exit 1

      - name: InfluxDB buckets provisioned (rollup self-created by the AE)
        run: |
          for _ in $(seq 1 12); do
            docker compose exec -T influxdb influx bucket list --json > /tmp/buckets.json
            grep -q alarm_engine_metrics /tmp/buckets.json \
              && grep -q alarm_engine_metrics_rollup /tmp/buckets.json && exit 0
            sleep 5
          done
          cat /tmp/buckets.json
          echo "rollup bucket not provisioned by the alarm engine" >&2
          exit 1

      - name: Metric ingest end-to-end (agent-style batch POST → AE)
        run: |
          . ./.env
          curl -fsSk -X POST "$AE_SCHEME://localhost:8081/api/alarm/metrics/batch" \
            -H "Authorization: Bearer $LSM_AE_INGEST_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"metrics":[{"source":"cpu","metric_name":"cpu_usage","value":42.0,"unit":"%","hostname":"ci-smoke"}]}'

      - name: Dashboard login (llmadmin) + admin route reachable
        run: |
          jar=$(mktemp)
          login=$(curl -s -o /dev/null -w '%{http_code}' -c "$jar" \
            --data-urlencode username=llmadmin --data-urlencode password=llmadmin \
            http://localhost:5000/login)
          echo "login -> HTTP $login"
          # Successful login always 302-redirects to /; a failed one renders 401.
          [ "$login" = "302" ] || { echo "llmadmin/llmadmin login failed" >&2; exit 1; }
          admin=$(curl -s -o /dev/null -w '%{http_code}' -b "$jar" \
            http://localhost:5000/api/admin/audit-log)
          echo "admin route -> HTTP $admin"
          [ "$admin" = "200" ] || { echo "admin route not reachable as llmadmin (got $admin)" >&2; exit 1; }

      - name: Manager TLS cert covers LSM_MANAGER_PUBLIC_HOST
        run: |
          crt=/opt/llm-systems-manager/data/manager-tls.crt
          ok=""
          for _ in $(seq 1 12); do
            docker compose exec -T manager test -s "$crt" && ok=1 && break
            sleep 5
          done
          [ -n "$ok" ] || { echo "manager cert never appeared at $crt" >&2; exit 1; }
          docker compose cp manager:"$crt" /tmp/mtls.crt
          openssl x509 -in /tmp/mtls.crt -noout -ext subjectAltName | tee /tmp/san.txt
          grep -q "192.168.99.99" /tmp/san.txt \
            || { echo "public host missing from manager cert SAN" >&2; exit 1; }

      - name: Alarm-engine TLS cert covers LSM_MANAGER_PUBLIC_HOST (#400)
        run: |
          crt=/opt/llm-systems-manager/llm-systems-alarm-engine/data/ae-tls.crt
          docker compose cp alarm-engine:"$crt" /tmp/aetls.crt
          openssl x509 -in /tmp/aetls.crt -noout -ext subjectAltName | tee /tmp/aesan.txt
          grep -q "192.168.99.99" /tmp/aesan.txt \
            || { echo "public host missing from alarm-engine cert SAN" >&2; exit 1; }

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down
        if: always()
        run: docker compose down -v

  # Released → PR upgrade: bring up the published ghcr images, write real
  # state (CA, agent, admin password, metric, AE cert), recreate onto the
  # PR-built images IN PLACE, and assert every piece survived — the config
  # re-render + volume-persistence regression class (#395/#396).
  compose-upgrade:
    name: released → PR upgrade keeps state
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Check a released baseline image exists on ghcr
        run: |
          if docker manifest inspect ghcr.io/llmsyscore/llm-systems-manager/manager:latest >/dev/null 2>&1; then
            echo "baseline manager:latest found"
          else
            echo "::warning::no released ghcr manager:latest reachable — skipping the upgrade test"
            echo "SKIP_UPGRADE=1" >> "$GITHUB_ENV"
          fi

      # Anonymous pull works while the packages are public; the login keeps
      # this job alive if their visibility is ever flipped.
      - name: Log in to ghcr
        if: env.SKIP_UPGRADE != '1'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create .env (baseline = released :latest)
        if: env.SKIP_UPGRADE != '1'
        run: |
          {
            echo "LSM_INFLUX_PASSWORD=$(openssl rand -hex 12)"
            echo "LSM_INFLUX_TOKEN=$(openssl rand -hex 32)"
            echo "LSM_AE_INGEST_TOKEN=$(openssl rand -hex 32)"
            echo "LSM_IMAGE_TAG=latest"
            # Phase 1 pulls released :latest (absent locally → "missing" still
            # pulls); phase 2 recreates onto locally-built pr-test images.
            echo "LSM_PULL_POLICY=missing"
          } > .env

      - name: Bring up the RELEASED stack (pull, never build)
        if: env.SKIP_UPGRADE != '1'
        run: |
          docker compose pull -q
          docker compose up -d --no-build --wait --wait-timeout 300
          curl -fsS http://localhost:5000/health

      - name: Seed state on the released stack
        if: env.SKIP_UPGRADE != '1'
        run: |
          . ./.env
          if curl -fsSk https://localhost:8081/health >/dev/null 2>&1; then AE_SCHEME=https; else AE_SCHEME=http; fi
          echo "AE_SCHEME=$AE_SCHEME" >> "$GITHUB_ENV"
          # Uniquely-tagged metric into the influxdb-data volume.
          curl -fsSk -X POST "$AE_SCHEME://localhost:8081/api/alarm/metrics/batch" \
            -H "Authorization: Bearer $LSM_AE_INGEST_TOKEN" -H "Content-Type: application/json" \
            -d '{"metrics":[{"source":"cpu","metric_name":"cpu_usage","value":77.0,"unit":"%","hostname":"ci-persist-host"}]}'
          # Registered agent into the manager-data volume.
          aid="$(curl -fsS -X POST http://localhost:5000/api/agents/register \
            -H 'Content-Type: application/json' \
            -d '{"hostname":"ci-persist-agent","os":"linux"}' | jq -r '.agent_id')"
          { [ -n "$aid" ] && [ "$aid" != "null" ]; } || { echo "agent registration failed" >&2; exit 1; }
          echo "SEED_AGENT_ID=$aid" >> "$GITHUB_ENV"
          # Changed admin password (the #395 users-file re-seed guard).
          jar="$(mktemp)"; newpw="pw-$(openssl rand -hex 8)"
          code="$(curl -s -o /dev/null -w '%{http_code}' -c "$jar" \
            --data-urlencode username=llmadmin --data-urlencode password=llmadmin http://localhost:5000/login)"
          [ "$code" = "302" ] || { echo "baseline llmadmin login failed ($code)" >&2; exit 1; }
          curl -fsS -X POST http://localhost:5000/api/account/password -b "$jar" \
            -H 'Content-Type: application/json' \
            -d "{\"current_password\":\"llmadmin\",\"new_password\":\"$newpw\"}" | jq -e '.ok'
          echo "SEED_NEWPW=$newpw" >> "$GITHUB_ENV"
          # Identity files whose regeneration would betray a wiped volume.
          for _ in $(seq 1 12); do
            docker compose exec -T alarm-engine test -s data/ae-tls.crt && break
            sleep 5
          done
          docker compose cp manager:/opt/llm-systems-manager/data/internal-ca.crt /tmp/ca-before.crt
          docker compose cp alarm-engine:/opt/llm-systems-manager/llm-systems-alarm-engine/data/ae-tls.crt /tmp/ae-before.crt

      - name: Upgrade in place to the PR images (build → up, no down)
        if: env.SKIP_UPGRADE != '1'
        run: |
          sed -i 's/^LSM_IMAGE_TAG=.*/LSM_IMAGE_TAG=pr-test/' .env
          docker compose build
          docker compose up -d --no-build --wait --wait-timeout 300
          curl -fsS http://localhost:5000/health

      - name: Assert the app images actually swapped (influxdb untouched)
        if: env.SKIP_UPGRADE != '1'
        run: |
          docker inspect --format '{{.Config.Image}}' "$(docker compose ps -q manager)"      | grep -F ':pr-test'
          docker inspect --format '{{.Config.Image}}' "$(docker compose ps -q alarm-engine)" | grep -F ':pr-test'
          docker inspect --format '{{.Config.Image}}' "$(docker compose ps -q influxdb)"     | grep -F 'influxdb:2.7'

      - name: Assert every seeded piece of state survived the upgrade
        if: env.SKIP_UPGRADE != '1'
        run: |
          # CA + AE cert byte-identical (a regenerated pair = wiped volume).
          docker compose cp manager:/opt/llm-systems-manager/data/internal-ca.crt /tmp/ca-after.crt
          docker compose cp alarm-engine:/opt/llm-systems-manager/llm-systems-alarm-engine/data/ae-tls.crt /tmp/ae-after.crt
          cmp /tmp/ca-before.crt /tmp/ca-after.crt
          cmp /tmp/ae-before.crt /tmp/ae-after.crt
          # Admin password: new one works, seeded default must NOT be back.
          jar="$(mktemp)"
          code="$(curl -s -o /dev/null -w '%{http_code}' -c "$jar" \
            --data-urlencode username=llmadmin --data-urlencode password="$SEED_NEWPW" http://localhost:5000/login)"
          [ "$code" = "302" ] || { echo "changed admin password lost in upgrade ($code)" >&2; exit 1; }
          old="$(curl -s -o /dev/null -w '%{http_code}' \
            --data-urlencode username=llmadmin --data-urlencode password=llmadmin http://localhost:5000/login)"
          [ "$old" = "401" ] || { echo "default llmadmin password works again — users file re-seeded ($old)" >&2; exit 1; }
          # Config re-render on the PR image: admin route still reachable.
          admin="$(curl -s -o /dev/null -w '%{http_code}' -b "$jar" http://localhost:5000/api/admin/audit-log)"
          [ "$admin" = "200" ] || { echo "admin route broken after upgrade ($admin)" >&2; exit 1; }
          # Registered agent survived in manager-data.
          curl -fsS -b "$jar" http://localhost:5000/api/agents \
            | jq -e --arg id "$SEED_AGENT_ID" '.agents[] | select(.agent_id==$id)'
          # Metric history survived in influxdb-data.
          docker compose exec -T influxdb influx query \
            'from(bucket:"alarm_engine_metrics") |> range(start:-2h) |> filter(fn: (r) => r.hostname == "ci-persist-host")' \
            > /tmp/metric-query.txt
          grep -F 'ci-persist-host' /tmp/metric-query.txt
          grep -F '77' /tmp/metric-query.txt

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down
        if: always()
        run: docker compose down -v

  # The compose smoke is amd64-only; this catches arm64-only failures
  # (e.g. missing wheels forcing source builds) before a release tag does.
  arm64-build:
    name: arm64 image build (no push)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Build both targets for linux/arm64
        run: |
          for target in manager alarm-engine; do
            docker buildx build --file docker/Dockerfile --target "$target" \
              --platform linux/arm64 .
          done
