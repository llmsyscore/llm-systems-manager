# Control-plane bring-up: manager + alarm engine + InfluxDB (#384). Quick start:
# cp .env.example .env → fill in secrets → docker compose up -d. Docs: docker/README.md.

x-lsm-env: &lsm-env
  LSM_INFLUX_ORG: ${LSM_INFLUX_ORG:-llm-systems-manager}
  LSM_INFLUX_TOKEN: ${LSM_INFLUX_TOKEN:?set LSM_INFLUX_TOKEN in .env}
  LSM_AE_INGEST_TOKEN: ${LSM_AE_INGEST_TOKEN:-REPLACE_ME}
  LSM_AE_MANAGEMENT_TOKEN: ${LSM_AE_MANAGEMENT_TOKEN:-}
  LSM_ALARM_ENGINE_URL: ${LSM_ALARM_ENGINE_URL:-http://alarm-engine:8081}
  LSM_AE_TLS_ENABLED: ${LSM_AE_TLS_ENABLED:-true}
  LSM_CORS_ORIGINS: ${LSM_CORS_ORIGINS:-http://localhost:5000}
  LSM_LOG_LEVEL: ${LSM_LOG_LEVEL:-INFO}
  LSM_ADMIN_USER: ${LSM_ADMIN_USER:-}
  LSM_ADMIN_CIDRS: ${LSM_ADMIN_CIDRS:-}
  LSM_MANAGER_PUBLIC_HOST: ${LSM_MANAGER_PUBLIC_HOST:-}
  LSM_SMTP_SERVER: ${LSM_SMTP_SERVER:-}
  LSM_SMTP_PORT: ${LSM_SMTP_PORT:-}
  LSM_SMTP_USER: ${LSM_SMTP_USER:-}
  LSM_SMTP_PASSWORD: ${LSM_SMTP_PASSWORD:-}
  LSM_DISCORD_WEBHOOK_URL: ${LSM_DISCORD_WEBHOOK_URL:-}

services:
  influxdb:
    image: influxdb:2.7
    restart: unless-stopped
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${LSM_INFLUX_USERNAME:-llmsys}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${LSM_INFLUX_PASSWORD:?set LSM_INFLUX_PASSWORD in .env}
      DOCKER_INFLUXDB_INIT_ORG: ${LSM_INFLUX_ORG:-llm-systems-manager}
      DOCKER_INFLUXDB_INIT_BUCKET: alarm_engine_metrics
      DOCKER_INFLUXDB_INIT_RETENTION: ${LSM_INFLUX_RETENTION:-30d}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${LSM_INFLUX_TOKEN:?set LSM_INFLUX_TOKEN in .env}
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 20s
    # Uncomment to reach InfluxDB from outside the compose network:
    # ports:
    #   - "8086:8086"

  manager:
    image: ghcr.io/llmsyscore/llm-systems-manager/manager:${LSM_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: manager
    restart: unless-stopped
    depends_on:
      influxdb:
        condition: service_healthy
    environment: *lsm-env
    ports:
      - "5000:5000"   # dashboard + API (HTTP)
      - "5443:5443"   # dashboard + API (HTTPS, internal CA)
      - "5444:5444"   # /ws/alarm WebSocket proxy
      - "5445:5445"   # llama-state SSE daemon
    volumes:
      - manager-data:/opt/llm-systems-manager/data
      # Shared with the alarm engine: the manager issues ae-tls.{crt,key}
      # (internal CA) into this volume at startup, same as a co-located install.
      - ae-data:/opt/llm-systems-manager/llm-systems-alarm-engine/data

  alarm-engine:
    image: ghcr.io/llmsyscore/llm-systems-manager/alarm-engine:${LSM_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: alarm-engine
    restart: unless-stopped
    depends_on:
      influxdb:
        condition: service_healthy
      manager:
        condition: service_started
    environment: *lsm-env
    ports:
      - "8081:8081"   # agent metric ingest + alarms API/UI
    volumes:
      - ae-data:/opt/llm-systems-manager/llm-systems-alarm-engine/data

volumes:
  influxdb-data:
  influxdb-config:
  manager-data:
  ae-data:
