name: Install tests

# Installer integration tests (#25): exercise tools/installer/install.sh
# end-to-end on a systemd-capable VM runner.
# - fresh-install: mode 1 (manager + alarm engine + InfluxDB + local agent)
#   from the PR tree, then the ci-smoke oracle.
# - upgrade: install the PR's base commit, then update.sh to the PR head;
#   update.sh itself asserts each service self-reports the new version,
#   and ci-smoke re-verifies. This is the only job that catches the
#   "new agent/*.py missing from an install file-list → crash-loop only
#   after upgrade" class of bug (gotcha #24).
# - release-install: mode 1 through the DEFAULT source path — a checksum-
#   verified release tarball built (and served over file://) exactly like
#   release.yml. The other two jobs use the local checkout / a preset
#   REPO_SRC, so this is the only job that runs acquire_source_tree +
#   fetch_release_tree, and it catches files git archive drops that a real
#   install needs (#383).
#
# Heavy (~15 min/job), so gated by paths: to installer/agent/requirements
# changes; use workflow_dispatch for a manual run on anything else. A
# nightly schedule catches drift against upstream package repos.

on:
  pull_request:
    branches: [main]
    paths:
      - "tools/installer/**"
      - "agent/**"
      - "**/requirements*.txt"
      - ".github/workflows/install-test.yml"
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

concurrency:
  group: install-test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fresh-install:
    name: fresh install (mode 1)
    runs-on: ubuntu-latest
    # Covers the initial install AND a reinstall-over-stale-tree pass (#352).
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # Non-TTY runs refuse to auto-apt missing prerequisites; provide them
      # up front (the rest of the runner image already has git/curl/python3).
      - name: Install prerequisites
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            jq rsync wget gnupg ca-certificates openssl sqlite3 \
            python3-venv python3-pip python3-dev build-essential

      # Non-interactive: prompts take detected defaults, services start by
      # default, and the local agent installs after the manager is up.
      # --no-self-update pins the run to the PR's installer, not upstream's.
      - name: Run installer (mode 1)
        run: sudo bash tools/installer/install.sh --mode 1 --no-self-update < /dev/null

      - name: Smoke test
        run: sudo bash tools/installer/ci-smoke.sh

      # Reinstall coverage (#352): plant every manifest entry as stale state,
      # re-run install.sh over the live tree, and assert the deploy pruned it.
      - name: Plant stale upstream-removed artifacts (reinstall fixture)
        run: sudo bash tools/installer/ci-plant-stale-fixture.sh tools/installer/removed-paths.manifest

      - name: Reinstall over existing tree (mode 1)
        run: sudo bash tools/installer/install.sh --mode 1 --no-self-update < /dev/null

      - name: Smoke test (post-reinstall)
        run: sudo bash tools/installer/ci-smoke.sh

      - name: Collect service logs on failure
        if: failure()
        run: |
          for u in influxdb llm-systems-alarm-engine llm-systems-manager llm-systems-agent; do
            echo "════ journalctl -u $u ════"
            sudo journalctl -u "$u" -n 200 --no-pager || true
          done

  upgrade:
    name: upgrade (base → head)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      # On pull_request, base.sha is the upgrade-from baseline; scheduled and
      # manual runs fall back to main → main (a no-op-update drift check).
      - name: Checkout base (upgrade-from)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha || 'main' }}
          path: base

      - name: Checkout head (upgrade-to)
        uses: actions/checkout@v4
        with:
          path: head

      - name: Install prerequisites
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            jq rsync wget gnupg ca-certificates openssl sqlite3 \
            python3-venv python3-pip python3-dev build-essential

      - name: Install baseline (mode 1)
        working-directory: base
        run: sudo bash tools/installer/install.sh --mode 1 --no-self-update < /dev/null

      - name: Record pre-upgrade manager version
        run: |
          curl -fsS -m 10 http://127.0.0.1:5000/health | jq -r .version | tee /tmp/version-before

      # Plants every manifest `file` entry (plus fake bytecode) and two removed
      # TOML keys as stale state; ci-smoke asserts absence after the upgrade.
      - name: Plant stale upstream-removed artifacts
        run: sudo bash head/tools/installer/ci-plant-stale-fixture.sh head/tools/installer/removed-paths.manifest

      # REPO_SRC points update.sh at the PR-head checkout so it deploys the
      # code under test instead of cloning upstream main. --yes auto-confirms
      # the per-component sync/restart prompts; update.sh then verifies each
      # restarted service self-reports the freshly deployed version and
      # exits non-zero on mismatch or failed units.
      - name: Upgrade to head
        run: sudo REPO_SRC="$GITHUB_WORKSPACE/head" bash head/tools/installer/update.sh --yes

      - name: Smoke test (post-upgrade)
        run: sudo bash head/tools/installer/ci-smoke.sh

      - name: Assert manager runs the head version
        run: |
          want="$(grep -E '^__version__' head/llm-systems-manager/backend/llm-systems-manager.py | sed -E 's/.*"([^"]+)".*/\1/')"
          got="$(curl -fsS -m 10 http://127.0.0.1:5000/health | jq -r .version)"
          echo "before=$(cat /tmp/version-before) after=$got head-source=$want"
          test "$got" = "$want"

      - name: Collect service logs on failure
        if: failure()
        run: |
          for u in influxdb llm-systems-alarm-engine llm-systems-manager llm-systems-agent; do
            echo "════ journalctl -u $u ════"
            sudo journalctl -u "$u" -n 200 --no-pager || true
          done

  release-install:
    name: release-tarball install (mode 1)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # TAG is a throwaway CI-only version; the tarball is built + served
    # locally, never published. Matches the installer's asset-name contract:
    # llm-systems-manager-<tag>.tar.gz with a llm-systems-manager-<tag>/ prefix.
    env:
      TAG: v0.0.0-ci
    steps:
      - uses: actions/checkout@v4

      - name: Install prerequisites
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            jq rsync wget gnupg ca-certificates openssl sqlite3 \
            python3-venv python3-pip python3-dev build-essential

      # Build the tarball + checksum exactly like release.yml, so this job
      # doubles as a smoke test of the release artifact itself.
      - name: Build release tarball + checksum
        run: |
          ASSET="llm-systems-manager-${TAG}.tar.gz"
          mkdir -p "${RUNNER_TEMP}/serve/${TAG}"
          git archive --format=tar.gz \
            --prefix="llm-systems-manager-${TAG}/" \
            -o "${RUNNER_TEMP}/serve/${TAG}/${ASSET}" HEAD
          ( cd "${RUNNER_TEMP}/serve/${TAG}" && sha256sum "$ASSET" | tee "$ASSET.sha256" )

      # git archive honors .gitattributes export-ignore and drops untracked
      # files; assert the archive still carries files a real install needs.
      - name: Assert tarball completeness
        run: |
          ASSET="${RUNNER_TEMP}/serve/${TAG}/llm-systems-manager-${TAG}.tar.gz"
          for f in tools/installer/removed-paths.manifest \
                   tools/installer/toml_reconcile.py \
                   config/llm-systems.toml.example; do
            tar -tzf "$ASSET" | grep -qx "llm-systems-manager-${TAG}/$f" \
              || { echo "MISSING from release tarball: $f"; exit 1; }
          done

      # Run install.sh from OUTSIDE the checkout so it takes the release path;
      # a local git tree would trigger the use-local-checkout branch instead.
      # file:// base URL + pinned tag serve the just-built tarball to curl.
      - name: Install from release tarball (mode 1)
        run: |
          cp tools/installer/install.sh "${RUNNER_TEMP}/install.sh"
          sudo LLMSYS_RELEASE_TAG="${TAG}" \
               LLMSYS_RELEASE_BASE_URL="file://${RUNNER_TEMP}/serve" \
               bash "${RUNNER_TEMP}/install.sh" --mode 1 --no-self-update < /dev/null

      - name: Smoke test
        run: sudo bash tools/installer/ci-smoke.sh

      - name: Collect service logs on failure
        if: failure()
        run: |
          for u in influxdb llm-systems-alarm-engine llm-systems-manager llm-systems-agent; do
            echo "════ journalctl -u $u ════"
            sudo journalctl -u "$u" -n 200 --no-pager || true
          done
